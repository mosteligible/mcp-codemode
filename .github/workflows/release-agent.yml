name: Release Agent

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.meta.outputs.tag }}
      release_name: ${{ steps.meta.outputs.release_name }}
    steps:
      - name: Compute release metadata
        id: meta
        run: |
          tag="agent-main-${GITHUB_RUN_NUMBER}-${GITHUB_SHA::7}"
          echo "tag=${tag}" >> "$GITHUB_OUTPUT"
          echo "release_name=Agent ${tag}" >> "$GITHUB_OUTPUT"

  build:
    needs: prepare
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: agent/go.mod

      - name: Build agent binary
        working-directory: agent
        env:
          CGO_ENABLED: 0
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          go build -trimpath -ldflags='-s -w' -o ../dist/agent-${GOOS}-${GOARCH}/agent .

      - name: Package release archive
        working-directory: dist
        run: |
          archive_name="agent_${{ matrix.goos }}_${{ matrix.goarch }}.tar.gz"
          tar -czf "$archive_name" -C "agent-${{ matrix.goos }}-${{ matrix.goarch }}" agent

      - name: Upload packaged archive
        uses: actions/upload-artifact@v4
        with:
          name: agent-${{ matrix.goos }}-${{ matrix.goarch }}
          path: dist/agent_${{ matrix.goos }}_${{ matrix.goarch }}.tar.gz

  release:
    needs:
      - prepare
      - build
    runs-on: ubuntu-latest
    steps:
      - name: Download packaged archives
        uses: actions/download-artifact@v4
        with:
          path: release-assets

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.prepare.outputs.tag }}
          name: ${{ needs.prepare.outputs.release_name }}
          generate_release_notes: true
          make_latest: true
          files: |
            release-assets/**/agent_linux_amd64.tar.gz
            release-assets/**/agent_linux_arm64.tar.gz
