syntax = "proto3";

package pb;

import "google/protobuf/empty.proto";

option go_package = "github.com/mosteligible/mcp-codemode/agent/pb";

message ExecuteCodeRequest {
    string instruction = 1;
    string language = 2;
    string session_id = 3;
}

message HealthStatus {
    int32 code = 1;
    string message = 2;
}

message ExecuteCodeResponse {
    int32 exit_code = 1;
    string output = 2;
    string error = 3;
}

service Agent {
    rpc Status(google.protobuf.Empty) returns (HealthStatus);
    rpc ExecuteCode(ExecuteCodeRequest) returns (ExecuteCodeResponse);
    rpc ExecuteCodeFresh(ExecuteCodeRequest) returns (ExecuteCodeResponse);
}
